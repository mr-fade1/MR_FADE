<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!-- توجيه احتياطي في حال كان الجافاسكريبت معطلاً -->
    <meta http-equiv="refresh" content="15;url=https://mrfade.site">
    <title>تم نقل الموقع - MrFade</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;800&display=swap" rel="stylesheet">
    
    <style>
        body {
            font-family: 'Cairo', sans-serif;
        }
        .float-animation {
            animation: float 3s ease-in-out infinite;
        }
        @keyframes float {
            0% { transform: translateY(0px); }
            50% { transform: translateY(-10px); }
            100% { transform: translateY(0px); }
        }
        .pulse-circle {
            animation: pulse-ring 2s cubic-bezier(0.215, 0.61, 0.355, 1) infinite;
        }
        @keyframes pulse-ring {
            0% { transform: scale(0.8); opacity: 0.5; }
            100% { transform: scale(1.3); opacity: 0; }
        }
        @keyframes fade-in-up {
            0% { opacity: 0; transform: translateY(20px); }
            100% { opacity: 1; transform: translateY(0); }
        }
        .animate-fade-in-up {
            animation: fade-in-up 0.8s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        }
        .opacity-0 { opacity: 0; }
        .delay-100 { animation-delay: 100ms; }
        .delay-200 { animation-delay: 200ms; }
        .delay-300 { animation-delay: 300ms; }
        .delay-400 { animation-delay: 400ms; }
    </style>
</head>

<body class="min-h-screen bg-gradient-to-br from-gray-900 via-gray-800 to-gray-900 flex items-center justify-center p-4">

    <div class="max-w-lg w-full bg-gray-800 rounded-3xl shadow-2xl p-8 md:p-12 text-center relative overflow-hidden border border-gray-700 animate-fade-in-up">
        
        <!-- Decorative background elements (Dark mode optimized) -->
        <div class="absolute top-0 left-0 w-full h-2 bg-gradient-to-r from-indigo-500 to-purple-600"></div>
        <div class="absolute -top-10 -right-10 w-32 h-32 bg-purple-500 rounded-full filter blur-3xl opacity-20"></div>
        <div class="absolute -bottom-10 -left-10 w-32 h-32 bg-indigo-500 rounded-full filter blur-3xl opacity-20"></div>

        <div class="relative w-24 h-24 mx-auto mb-6 flex items-center justify-center opacity-0 animate-fade-in-up delay-100">
            <div class="absolute inset-0 bg-indigo-500/20 rounded-full pulse-circle"></div>
            <div class="relative bg-indigo-600 text-white w-16 h-16 rounded-full flex items-center justify-center shadow-[0_0_20px_rgba(79,70,229,0.4)] float-animation">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-8 w-8" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                    <path stroke-linecap="round" stroke-linejoin="round" d="M13 5l7 7-7 7M5 5l7 7-7 7" />
                </svg>
            </div>
        </div>

        <h1 class="text-3xl md:text-4xl font-bold text-white mb-4 opacity-0 animate-fade-in-up delay-200">تم نقل الموقع</h1>
        
        <p class="text-gray-300 text-lg mb-6 leading-relaxed opacity-0 animate-fade-in-up delay-200">
            لقد قمنا بالانتقال إلى عنوان جديد لتقديم تجربة أفضل لك.
        </p>

        <div class="bg-gray-900/50 rounded-xl p-4 mb-8 border border-gray-700 flex items-center justify-center space-x-2 space-x-reverse opacity-0 animate-fade-in-up delay-300">
            <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5 text-indigo-400" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13.828 10.172a4 4 0 00-5.656 0l-4 4a4 4 0 105.656 5.656l1.102-1.101m-.758-4.899a4 4 0 005.656 0l4-4a4 4 0 00-5.656-5.656l-1.1 1.1" />
            </svg>
            <span class="text-gray-200 font-semibold dir-ltr" dir="ltr">https://mrfade.site</span>
        </div>

        <a href="https://mrfade.site" 
           class="inline-flex items-center justify-center w-full px-8 py-4 text-lg font-bold text-white transition-all duration-300 bg-gradient-to-r from-indigo-600 to-purple-600 rounded-xl hover:from-indigo-500 hover:to-purple-500 hover:shadow-[0_10px_20px_rgba(79,70,229,0.3)] hover:-translate-y-1 focus:outline-none focus:ring-4 focus:ring-indigo-500/50 opacity-0 animate-fade-in-up delay-300">
            <span>الانتقال إلى الموقع الجديد الآن</span>
            <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5 mr-2" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                <path stroke-linecap="round" stroke-linejoin="round" d="M11 19l-7-7 7-7m8 14l-7-7 7-7" />
            </svg>
        </a>

        <p class="mt-6 text-sm text-gray-400 font-medium opacity-0 animate-fade-in-up delay-400">
            سيتم توجيهك تلقائياً خلال <span id="countdown" class="text-indigo-400 font-bold text-base px-1">15</span> ثانية...
        </p>

        <div class="mt-6 p-4 bg-red-900/20 border border-red-800/50 rounded-xl flex items-start space-x-3 space-x-reverse text-right opacity-0 animate-fade-in-up delay-400">
            <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6 text-red-400 flex-shrink-0 mt-0.5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                <path stroke-linecap="round" stroke-linejoin="round" d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z" />
            </svg>
            <p class="text-sm text-red-300 font-semibold leading-relaxed">
                تحذير هام: سيتم إغلاق موقع إعادة التوجيه هذا نهائياً خلال أسبوع. يرجى التأكد من حفظ الرابط الجديد للوصول إلينا لاحقاً.
            </p>
        </div>

    </div>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            let secondsRemaining = 15;
            const countdownElement = document.getElementById('countdown');
            const targetUrl = 'https://mrfade.site';

            const interval = setInterval(() => {
                secondsRemaining--;
                countdownElement.textContent = secondsRemaining;

                if (secondsRemaining <= 0) {
                    clearInterval(interval);
                    // تنفيذ التوجيه
                    window.location.href = targetUrl;
                }
            }, 1000);
        });
    </script>
</body>
</html>
