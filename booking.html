<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>MR FADE | SECURE BOOKING</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@600;800;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-dark: #050505;
            --acid-yellow: #CCFF00;
            --cyber-cyan: #00F0FF;
            --alert-red: #FF003C;
            --text-main: #FFFFFF;
            --text-muted: #888888;
            --glass-panel: rgba(255, 255, 255, 0.03);
            --glass-border: rgba(255, 255, 255, 0.08);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

        body {
            background-color: var(--bg-dark); color: var(--text-main);
            font-family: 'Cairo', sans-serif; min-height: 100vh; overflow: hidden;
            display: flex; align-items: center; justify-content: center;
        }

        /* مؤثرات الخلفية مطابقة للرئيسية */
        #bg-canvas { position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; z-index: 1; pointer-events: none; }
        
        .noise-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: 5; pointer-events: none; opacity: 0.04;
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
        }

        /* كلمة BOOK العملاقة المفرغة بالخلفية */
        .bg-huge-text {
            position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%);
            font-size: 22vw; font-weight: 900; color: transparent;
            -webkit-text-stroke: 2px rgba(255, 255, 255, 0.03);
            z-index: 2; pointer-events: none; user-select: none;
            text-transform: uppercase; white-space: nowrap; font-style: italic; letter-spacing: -2px;
        }

        /* زر العودة (Cyber Style) */
        .back-nav {
            position: fixed; top: 24px; right: 24px; z-index: 100;
            width: 48px; height: 48px; background: rgba(255,255,255,0.05);
            border: 1px solid var(--glass-border); border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            color: var(--text-main); text-decoration: none; backdrop-filter: blur(10px);
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        .back-nav svg { width: 22px; height: 22px; stroke: currentColor; stroke-width: 2.5; fill: none; transition: 0.3s; }
        .back-nav:hover { background: var(--acid-yellow); color: #000; border-color: var(--acid-yellow); transform: translateX(-5px) rotate(-15deg); }

        /* ----- لوحة الحجز متطابقة مع كروت الرئيسية ----- */
        .hype-panel {
            position: relative; z-index: 10; width: 90%; max-width: 380px;
            background: var(--glass-panel); backdrop-filter: blur(16px); -webkit-backdrop-filter: blur(16px);
            border: 1px solid var(--glass-border); border-radius: 24px;
            padding: 30px 20px; display: flex; flex-direction: column;
            animation: slideUp 0.6s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards;
            box-shadow: 0 30px 60px rgba(0,0,0,0.8);
            max-height: 90vh; overflow-y: auto; scrollbar-width: none;
        }
        .hype-panel::-webkit-scrollbar { display: none; }

        @keyframes slideUp { 
            0% { transform: translateY(50px) scale(0.95); opacity: 0; } 
            100% { transform: translateY(0) scale(1); opacity: 1; } 
        }

        /* تأثير ألوان النيون (نفس الرئيسية) */
        .hype-panel::before {
            content: ''; position: absolute; top: 0; right: 0; width: 100%; height: 100%;
            background: radial-gradient(circle at top right, var(--acid-yellow) 0%, transparent 60%);
            opacity: 0.1; transition: 0.4s ease; z-index: 0; pointer-events: none; mix-blend-mode: overlay;
        }

        .panel-content { position: relative; z-index: 1; }

        .header-box { text-align: center; margin-bottom: 25px; }
        .logo-img { width: 140px; filter: drop-shadow(0 0 15px rgba(204, 255, 0, 0.2)); margin-bottom: 12px; }
        
        .pill-badge {
            display: inline-flex; align-items: center; justify-content: center;
            padding: 6px 16px; border-radius: 12px; font-size: 0.9rem; font-weight: 900;
            text-transform: uppercase; font-style: italic; letter-spacing: 0.5px;
            background: rgba(204, 255, 0, 0.1); color: var(--acid-yellow); border: 1px solid rgba(204, 255, 0, 0.2);
        }

        /* ----- العداد الخطي الضخم (Brutalist Power Bar) ----- */
        .power-counter {
            background: rgba(0,0,0,0.4); border: 1px solid var(--glass-border);
            border-radius: 16px; padding: 20px; margin-bottom: 20px;
            display: flex; flex-direction: column; gap: 10px;
        }
        
        .pc-header { display: flex; justify-content: space-between; align-items: flex-end; }
        .pc-numbers { display: flex; align-items: baseline; gap: 5px; }
        .pc-current { 
            font-size: 3.5rem; font-weight: 900; line-height: 0.8; 
            color: var(--text-main); font-style: italic; letter-spacing: -2px; 
            text-shadow: 0 0 20px rgba(255,255,255,0.2); transition: color 0.4s;
        }
        .pc-max { font-size: 1rem; font-weight: 800; color: var(--text-muted); }
        .pc-label { font-size: 0.75rem; font-weight: 800; color: var(--text-muted); letter-spacing: 2px; text-transform: uppercase; padding-bottom: 4px; }

        .pc-bar-bg { width: 100%; height: 8px; background: rgba(255,255,255,0.05); border-radius: 10px; overflow: hidden; }
        .pc-bar-fill {
            height: 100%; width: 0%; background: var(--acid-yellow); border-radius: 10px;
            box-shadow: 0 0 10px var(--acid-yellow); transition: width 1s cubic-bezier(0.175, 0.885, 0.32, 1.275), background-color 0.4s;
        }

        /* ----- رسالة اكتمال العدد ----- */
        .sold-out-msg {
            display: none; background: rgba(255, 0, 60, 0.05);
            border: 1px dashed var(--alert-red); border-radius: 16px;
            padding: 20px; text-align: center; margin-bottom: 20px;
            color: var(--alert-red); font-size: 1.3rem; font-weight: 900; font-style: italic;
            text-shadow: 0 0 10px rgba(255, 0, 60, 0.3);
        }
        .sold-out-msg small { display: block; font-size: 0.9rem; color: var(--text-muted); margin-top: 5px; font-weight: 700; font-style: normal; text-shadow: none; }

        /* ----- حقول الإدخال الشبابية ----- */
        .input-group { margin-bottom: 15px; position: relative; }
        .input-group input {
            width: 100%; padding: 16px 20px 16px 45px;
            background: rgba(0,0,0,0.4); border: 2px solid transparent; border-bottom: 2px solid var(--glass-border);
            border-radius: 14px; color: #fff; font-family: 'Cairo', sans-serif;
            font-size: 1.05rem; font-weight: 800; outline: none; transition: 0.3s;
        }
        .input-group input:focus { 
            border-color: var(--acid-yellow); background: rgba(204, 255, 0, 0.02);
            box-shadow: 0 10px 20px rgba(0,0,0,0.3), inset 0 0 0 1px var(--acid-yellow);
            transform: translateY(-2px);
        }
        .input-group input::placeholder { color: #555; font-weight: 600; font-style: italic; }
        
        .input-icon { position: absolute; right: 16px; top: 50%; transform: translateY(-50%); width: 20px; fill: #555; transition: 0.3s; }
        .input-group input:focus + .input-icon { fill: var(--acid-yellow); filter: drop-shadow(0 0 5px var(--acid-yellow)); }

        /* ----- زر الأكشن العنيف (Slanted Button) ----- */
        .btn-action {
            width: 100%; padding: 20px; margin-top: 5px; border: none; border-radius: 12px;
            background: var(--acid-yellow); color: #000;
            font-family: 'Cairo', sans-serif; font-size: 1.35rem; font-weight: 900; font-style: italic;
            cursor: pointer; position: relative; overflow: hidden; text-transform: uppercase; letter-spacing: 1px;
            box-shadow: 0 10px 20px rgba(204, 255, 0, 0.2);
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            /* القصة المائلة للروشنة */
            clip-path: polygon(4% 0, 100% 0, 96% 100%, 0 100%);
        }
        .btn-action:hover:not(:disabled) { 
            transform: translateY(-4px) scale(1.02); background: #fff; 
            box-shadow: 0 15px 30px rgba(255, 255, 255, 0.3); clip-path: polygon(0 0, 100% 0, 100% 100%, 0 100%); 
        }
        .btn-action:active:not(:disabled) { transform: scale(0.96); }
        .btn-action:disabled { background: #222; color: #555; box-shadow: none; cursor: not-allowed; clip-path: none; }

        .loader-ring {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            width: 24px; height: 24px; border: 3px solid rgba(0,0,0,0.2); border-top-color: #000;
            border-radius: 50%; animation: spin 0.6s linear infinite; opacity: 0; transition: 0.3s;
        }
        .btn-loading { color: transparent !important; pointer-events: none; }
        .btn-loading .loader-ring { opacity: 1; }
        @keyframes spin { to { transform: translate(-50%, -50%) rotate(360deg); } }

        /* Toast Alert */
        #toast {
            position: fixed; top: 24px; left: 50%; transform: translate(-50%, -100px);
            background: var(--cyber-cyan); color: #000; padding: 12px 24px;
            border-radius: 12px; font-weight: 900; font-size: 1.05rem;
            box-shadow: 0 10px 30px rgba(0, 240, 255, 0.4); z-index: 1000;
            transition: 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275); border: 2px solid #000;
        }

        @media (max-width: 380px) {
            .hype-panel { padding: 25px 20px; }
            .pc-current { font-size: 3rem; }
        }
    </style>
</head>
<body>

    <div class="bg-huge-text">MR FADE</div>
    <div class="noise-overlay"></div>
    <canvas id="bg-canvas"></canvas>

    <a href="index.html" class="back-nav">
        <svg viewBox="0 0 24 24"><path d="M5 12h14M12 5l7 7-7 7"/></svg>
    </a>

    <div class="hype-panel">
        <div class="panel-content">
            <div class="header-box">
                <img src="https://i.ibb.co/NgpMdYNB/logo-1.png" alt="MR FADE" class="logo-img">
                <br>
                <div class="pill-badge" id="srv-display">--</div>
            </div>

            <!-- عداد الطاقة الخطي الضخم (Brutalist Power Counter) -->
            <div class="power-counter" id="counter-box">
                <div class="pc-header">
                    <div class="pc-numbers">
                        <span class="pc-current" id="spot-num">0</span>
                        <span class="pc-max">/ <span id="max-limit">15</span></span>
                    </div>
                    <div class="pc-label">باقي 🔥</div>
                </div>
                <div class="pc-bar-bg">
                    <div class="pc-bar-fill" id="progress-bar"></div>
                </div>
            </div>

            <!-- رسالة اكتمال العدد (تظهر عندما يكون العدد 0) -->
            <div class="sold-out-msg" id="sold-out-box">
                خلصنا النهاردة هنستناك بكرة 🚫<br>
                <small> خليك جاهز!</small>
            </div>

            <div class="input-group">
                <input type="text" id="cName" placeholder="الاسم يا بطل" autocomplete="off">
                <svg class="input-icon" viewBox="0 0 24 24"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
            </div>
            <div class="input-group">
                <input type="tel" id="cPhone" placeholder="رقم الموبايل" autocomplete="off">
                <svg class="input-icon" viewBox="0 0 24 24"><rect x="5" y="2" width="14" height="20" rx="2" ry="2"/><line x1="12" y1="18" x2="12.01" y2="18"/></svg>
            </div>

            <button id="bookAction" class="btn-action" disabled>
                أكّـد الـحـجـز 🔥
                <div class="loader-ring"></div>
            </button>
        </div>
    </div>

    <div id="toast">تم الحجز!</div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script>
        // --- 3D Background (نفس المقص السايبربانك للرئيسية) ---
        const scene = new THREE.Scene();
        const camera = new THREE.PerspectiveCamera(50, window.innerWidth/window.innerHeight, 0.1, 100);
        const renderer = new THREE.WebGLRenderer({ canvas: document.getElementById('bg-canvas'), alpha: true, antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);

        const metalMat = new THREE.MeshPhysicalMaterial({ color: 0x0a0a0a, metalness: 0.9, roughness: 0.2, clearcoat: 1.0 });
        const scissorGroup = new THREE.Group();

        function createBlade(isThumb) {
            const half = new THREE.Group();
            const shape = new THREE.Shape();
            shape.moveTo(0, 0); shape.lineTo(0.3, 5); shape.lineTo(0, 6); shape.lineTo(-0.15, 0); shape.lineTo(0, 0);
            const blade = new THREE.Mesh(new THREE.ExtrudeGeometry(shape, { depth: 0.05, bevelEnabled: true, bevelSegments: 2, steps: 1, bevelSize: 0.02, bevelThickness: 0.02 }), metalMat);
            blade.position.set(0, 0.4, -0.025); half.add(blade);
            const shaft = new THREE.Mesh(new THREE.CylinderGeometry(0.12, 0.1, 1.5, 16), metalMat);
            shaft.position.set(0.05, -0.4, 0); half.add(shaft);
            const ring = new THREE.Mesh(new THREE.TorusGeometry(0.6, 0.12, 16, 32), metalMat);
            ring.position.set(0.1, -1.7, 0); if(isThumb) { ring.scale.set(1, 1.2, 1); ring.rotation.x = 0.2; }
            half.add(ring);
            return half;
        }

        const bladeA = createBlade(false); const bladeB = createBlade(true);
        bladeB.rotation.y = Math.PI; bladeB.position.z = 0.05;
        const screw = new THREE.Mesh(new THREE.CylinderGeometry(0.15, 0.15, 0.15, 32), new THREE.MeshStandardMaterial({ color: 0x222222, metalness: 1 }));
        screw.rotation.x = Math.PI/2; screw.position.set(0, 0.4, 0.025);
        scissorGroup.add(bladeA, bladeB, screw);
        scissorGroup.position.set(2, -1, -14); scissorGroup.rotation.z = Math.PI / 6;
        scene.add(scissorGroup);

        scene.add(new THREE.AmbientLight(0x050505));
        const yellowLight = new THREE.PointLight(0xCCFF00, 5, 30); yellowLight.position.set(5, 5, 2); scene.add(yellowLight);
        const cyanLight = new THREE.PointLight(0x00F0FF, 5, 30); cyanLight.position.set(-5, -5, 5); scene.add(cyanLight);
        const rimLight = new THREE.SpotLight(0xffffff, 2); rimLight.position.set(0, 10, 5); rimLight.lookAt(scissorGroup.position); scene.add(rimLight);

        const clock = new THREE.Clock();
        function animate() {
            requestAnimationFrame(animate);
            const t = clock.getElapsedTime();
            scissorGroup.position.y = Math.sin(t * 1.5) * 0.3 - 1;
            scissorGroup.rotation.y += 0.005;
            scissorGroup.rotation.x = Math.cos(t * 0.5) * 0.1;

            const cycle = (t * 2) % (Math.PI * 2);
            let cutAngle = (cycle < Math.PI) ? Math.abs(Math.sin(cycle * 2)) * 0.25 : 0; 
            bladeA.rotation.z = cutAngle; bladeB.rotation.z = -cutAngle;

            yellowLight.position.x = Math.sin(t) * 8; yellowLight.position.z = Math.cos(t) * 8;
            cyanLight.position.x = Math.sin(t + Math.PI) * 8;
            renderer.render(scene, camera);
        }
        animate();

        // --- Logic & Brutalist Counter ---
        const API_URL = "https://script.google.com/macros/s/AKfycby495Nz8jpA96IrefZNyekP_P7F7AtAMSlJrE4ugPuLdWOrtQihEwg53-VXM1qgljOU/exec";
        const service = localStorage.getItem('selectedService') || "غير محدد";
        const maxLimit = parseInt(localStorage.getItem('serviceLimit')) || 15;
        
        document.getElementById('srv-display').textContent = service;
        document.getElementById('max-limit').textContent = maxLimit;

        const progressBar = document.getElementById('progress-bar');
        
        function showToast(text, isError=false) {
            const toast = document.getElementById('toast');
            toast.textContent = text;
            toast.style.background = isError ? 'var(--alert-red)' : 'var(--cyber-cyan)';
            toast.style.color = isError ? '#FFF' : '#000';
            toast.style.transform = 'translate(-50%, 0)';
            setTimeout(() => toast.style.transform = 'translate(-50%, -100px)', 3000);
        }

        function animateValue(obj, start, end, duration) {
            let startTimestamp = null;
            const step = (timestamp) => {
                if (!startTimestamp) startTimestamp = timestamp;
                const progress = Math.min((timestamp - startTimestamp) / duration, 1);
                const easeOut = 1 - Math.pow(1 - progress, 4); 
                obj.innerHTML = Math.floor(easeOut * (end - start) + start);
                if (progress < 1) window.requestAnimationFrame(step);
            };
            window.requestAnimationFrame(step);
        }

        async function updateData() {
            if (new Date().getHours() >= 0 && new Date().getHours() < 1) {
                document.getElementById('spot-num').textContent = "0";
                document.getElementById('bookAction').textContent = "مغلق لـ 1 بالليل";
                progressBar.style.width = "0%";
                return;
            }
            try {
                const res = await fetch(`${API_URL}?service=${encodeURIComponent(service)}`);
                const booked = parseInt(await res.text()) || 0;
                const available = Math.max(0, maxLimit - booked);
                
                const numEl = document.getElementById('spot-num');
                const startNum = parseInt(numEl.textContent) || 0;
                animateValue(numEl, startNum, available, 1000);

                const percentage = available / maxLimit;
                progressBar.style.width = (percentage * 100) + '%';

                if (percentage <= 0.3) {
                    progressBar.style.backgroundColor = 'var(--alert-red)';
                    progressBar.style.boxShadow = '0 0 15px var(--alert-red)';
                    numEl.style.color = 'var(--alert-red)';
                    numEl.style.textShadow = '0 0 25px rgba(255, 0, 60, 0.4)';
                } else {
                    progressBar.style.backgroundColor = 'var(--acid-yellow)';
                    progressBar.style.boxShadow = '0 0 15px var(--acid-yellow)';
                    numEl.style.color = 'var(--text-main)';
                    numEl.style.textShadow = '0 0 20px rgba(255,255,255,0.2)';
                }

                if (available > 0) {
                    document.getElementById('bookAction').disabled = false;
                    document.getElementById('bookAction').innerHTML = 'أكّـد الـحـجـز 🔥 <div class="loader-ring"></div>';
                    document.getElementById('counter-box').style.display = 'flex';
                    document.getElementById('sold-out-box').style.display = 'none';
                }
                else {
                    document.getElementById('bookAction').disabled = true;
                    document.getElementById('bookAction').textContent = "تعال بكرة";
                    document.getElementById('counter-box').style.display = 'none';
                    document.getElementById('sold-out-box').style.display = 'block';
                }
            } catch(e) { document.getElementById('spot-num').textContent = "!"; }
        }

        // --- Submit ---
        document.getElementById('bookAction').onclick = async function() {
            const name = document.getElementById('cName').value.trim();
            const phone = document.getElementById('cPhone').value.trim();
            if(!name || !phone) return showToast('كمل بياناتك يا بطل', true);
            
            this.classList.add('btn-loading'); this.disabled = true;
            try {
                await fetch(`${API_URL}?name=${encodeURIComponent(name)}&phone=${encodeURIComponent(phone)}&service=${encodeURIComponent(service)}`);
                showToast('حجزك وصلنا 🔥 هنكلمك');
                setTimeout(() => window.location.href = 'index.html', 1500);
            } catch(e) {
                this.classList.remove('btn-loading'); this.disabled = false;
                showToast('مشكلة في النت، جرب تاني', true);
            }
        };

        setTimeout(updateData, 200); setInterval(updateData, 20000);
    </script>
</body>
</html>
